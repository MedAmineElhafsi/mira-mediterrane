version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mira_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira_secret
      POSTGRES_DB: mira_ordering
    ports:
      - "5432:5432"
    volumes:
      - mira_pgdata:/var/lib/postgresql/data

volumes:
  mira_pgdata:
